<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <title>Travel Recommendations</title>
    </head>
    <body>
        <!-- Navbar -->
        <header id="navbar">
            <div class="logo">
                <img src="./images/airplane.png" alt="Airplane Logo" width="32px" />
                <p>TravelBloom</p>
            </div>
            <nav>
                <a href="travel_recommendation.html">Home</a>
                <a href="about_us.html">About Us</a>
                <a href="contact_us.html">Contact Us</a>
            </nav>
            <div id="searchbar">
                <input id="searchinput" type="text" placeholder="Enter a destination or keyword">
                <div>
                    <button class="searchbutton" id="searchBtn">Search</button>
                    <button class="searchbutton" id="clearBtn">Clear</button>
                </div>
            </div>
        </header>
        <!-- Homepage -->
        <main>
            <div id="social-icons">
                <img src="./images/twitter.png" alt="Twitter Logo" width="40px" />
                <img src="./images/facebook.png" alt="Facebook Logo" width="40px" />
                <img src="./images/instagram.png" alt="Instagram Logo" width="40px" />
                <img src="./images/youtube.png" alt="YouTube Logo" width="40px" />
            </div>
            <div class="main-div contact-content">
                <div id="contact-content">
                    <h1>CONTACT US</h1>
                    <p>
                        Get in touch
                    </p>
                </div>
                <form>
                    <label for="name">Name</label>
                    <input type="text" id="name">
                    <label for="email">Email</label>
                    <input type="email" id="email">
                    <label for="message">Message</label>
                    <textarea id="message" rows="6"></textarea>
                    <button type="submit">Submit</button>
                </form>
            </div>
        </main>
    </body>
    <script src="./travel_recommendation.js"></script>
</html>
